services:
  db:
    image: postgres:15-alpine
    container_name: dacoris-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Waxmangme86
      POSTGRES_DB: dacoris
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dacoris-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dacoris-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:Waxmangme86@db:5432/dacoris
      - FRONTEND_URL=http://localhost
      - JWT_SECRET_KEY=f61375a0bb2981f19a4391c3e294b49a
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ADMIN_SESSION_EXPIRE_MINUTES=480
      - ORCID_CLIENT_ID=APP-JN6NH7T72NYTTQL7
      - ORCID_CLIENT_SECRET=9ef443b2-8641-4eb7-9d4d-fb73ea40278b
      - ORCID_REDIRECT_URI=http://localhost/api/auth/orcid/callback
      - ORCID_SANDBOX_MODE=true
      - ORCID_API_BASE_URL=https://sandbox.orcid.org
      - GLOBAL_ADMIN_EMAIL=admin@dacoris.org
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=50
      - NOTIFICATION_MODE=console
      - KOBO_API_BASE_URL=https://kf.kobotoolbox.org/api/v2
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dacoris-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dacoris-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dacoris-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: dacoris-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - dacoris-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dacoris-network:
    driver: bridge
